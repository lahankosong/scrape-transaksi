services:
  - type: web
    name: mypertamina-scraper
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: LARAVEL_API_URL
        sync: false
      - key: LARAVEL_API_KEY
        sync: false
